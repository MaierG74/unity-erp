<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QButton Flyer Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }
  
  /* Controls Panel */
  .controls { width: 320px; min-width: 320px; background: #16213e; border-right: 1px solid rgba(255,255,255,0.08); overflow-y: auto; padding: 20px; }
  .controls h2 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #1A8A7D; margin: 20px 0 12px; }
  .controls h2:first-child { margin-top: 0; }
  .control-group { margin-bottom: 12px; }
  .control-group label { display: block; font-size: 11px; font-weight: 500; color: #8a9bb5; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .control-group input[type="text"], .control-group textarea, .control-group select {
    width: 100%; padding: 8px 10px; background: #0f0c29; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; color: #e0e0e0; font-size: 13px; font-family: inherit;
  }
  .control-group textarea { resize: vertical; min-height: 60px; }
  .control-group input[type="range"] { width: 100%; accent-color: #1A8A7D; }
  .range-value { font-size: 11px; color: #1A8A7D; font-family: 'JetBrains Mono', monospace; float: right; }
  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 16px; }
  .preset-btn { padding: 8px; background: #0f0c29; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #e0e0e0; font-size: 11px; cursor: pointer; transition: all 0.2s; }
  .preset-btn:hover { border-color: #1A8A7D; color: #1A8A7D; }
  .preset-btn.active { border-color: #1A8A7D; background: rgba(26,138,125,0.15); color: #1A8A7D; }

  /* Preview Panel */
  .preview-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; overflow: auto; background: #2a2a3e; }
  
  /* Flyer Styles */
  .flyer {
    width: 595px; height: 842px; /* A4 at 72dpi ratio */
    background: #F4F7F9;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    box-shadow: 0 25px 80px rgba(0,0,0,0.5);
    transform-origin: top center;
  }
  
  .flyer .grid-bg {
    position: absolute; inset: 0; pointer-events: none;
    background-image: 
      linear-gradient(rgba(200,221,232,var(--grid-opacity)) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,221,232,var(--grid-opacity)) 1px, transparent 1px);
    background-size: 20px 20px;
  }
  
  /* Layout: Modern Clean */
  .flyer.layout-modern { display: flex; flex-direction: column; }
  .flyer.layout-modern .header-bar {
    background: linear-gradient(135deg, #0D4F4F 0%, #1A8A7D 100%);
    padding: 20px 32px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .flyer.layout-modern .header-bar .logo { font-size: 22px; font-weight: 800; color: white; letter-spacing: 2px; }
  .flyer.layout-modern .header-bar .tagline { font-size: 11px; color: rgba(255,255,255,0.8); font-style: italic; letter-spacing: 0.5px; }
  
  .flyer.layout-modern .hero-section {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 24px;
    position: relative;
  }
  .flyer.layout-modern .hero-section img {
    max-height: 100%; max-width: 100%; object-fit: contain;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));
  }
  
  .flyer.layout-modern .info-section {
    padding: 28px 32px 20px;
    position: relative;
  }
  .flyer.layout-modern .product-title-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 16px;
  }
  .flyer.layout-modern .product-name {
    font-size: 32px; font-weight: 800; color: #0D4F4F;
    line-height: 1.1;
  }
  .flyer.layout-modern .product-code {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: #8a9bb5; margin-top: 4px; letter-spacing: 1px;
  }
  .flyer.layout-modern .price-badge {
    font-size: 28px; font-weight: 800; color: white;
    background: linear-gradient(135deg, #E8734A, #e85d2f);
    padding: 8px 20px; border-radius: 8px;
    box-shadow: 0 4px 15px rgba(232,115,74,0.3);
    white-space: nowrap;
  }
  
  .flyer.layout-modern .promo-banner {
    background: linear-gradient(90deg, rgba(61,199,142,0.12), rgba(26,138,125,0.08));
    border-left: 3px solid #3DC78E;
    padding: 10px 16px;
    margin-bottom: 16px;
    border-radius: 0 6px 6px 0;
  }
  .flyer.layout-modern .promo-text {
    font-size: 14px; font-weight: 700; color: #0D4F4F;
    letter-spacing: 0.5px;
  }
  
  .flyer.layout-modern .features-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px 24px; margin-bottom: 16px;
  }
  .flyer.layout-modern .feature-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #3B4856;
  }
  .flyer.layout-modern .feature-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #1A8A7D; flex-shrink: 0;
  }
  
  .flyer.layout-modern .divider {
    height: 1px; background: linear-gradient(90deg, #C8DDE8, transparent);
    margin: 12px 0;
  }
  
  .flyer.layout-modern .footer-bar {
    background: #0D4F4F;
    padding: 14px 32px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .flyer.layout-modern .footer-contact {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: rgba(255,255,255,0.7);
    display: flex; gap: 20px;
  }
  .flyer.layout-modern .footer-tagline {
    font-size: 10px; color: rgba(255,255,255,0.5);
    font-style: italic;
  }
  
  /* Layout: Bold Dark */
  .flyer.layout-dark { display: flex; flex-direction: column; background: linear-gradient(170deg, #0f0c29 0%, #1a1a2e 40%, #16213e 100%); }
  .flyer.layout-dark .grid-bg { opacity: 0.3; }
  .flyer.layout-dark .header-bar {
    padding: 24px 32px; display: flex; justify-content: space-between; align-items: center;
  }
  .flyer.layout-dark .header-bar .logo { font-size: 20px; font-weight: 800; color: #1A8A7D; letter-spacing: 3px; }
  .flyer.layout-dark .header-bar .tagline { font-size: 10px; color: rgba(255,255,255,0.4); font-style: italic; }
  .flyer.layout-dark .hero-section { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .flyer.layout-dark .hero-section img { max-height: 100%; max-width: 100%; object-fit: contain; filter: drop-shadow(0 30px 60px rgba(0,0,0,0.5)); }
  .flyer.layout-dark .info-section { padding: 28px 32px 20px; }
  .flyer.layout-dark .product-title-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .flyer.layout-dark .product-name { font-size: 34px; font-weight: 800; color: white; line-height: 1.1; }
  .flyer.layout-dark .product-code { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 4px; letter-spacing: 1px; }
  .flyer.layout-dark .price-badge { font-size: 28px; font-weight: 800; color: white; background: linear-gradient(135deg, #E8734A, #e85d2f); padding: 8px 20px; border-radius: 8px; box-shadow: 0 4px 20px rgba(232,115,74,0.4); white-space: nowrap; }
  .flyer.layout-dark .promo-banner { background: rgba(61,199,142,0.1); border-left: 3px solid #3DC78E; padding: 10px 16px; margin-bottom: 14px; border-radius: 0 6px 6px 0; }
  .flyer.layout-dark .promo-text { font-size: 14px; font-weight: 700; color: #3DC78E; }
  .flyer.layout-dark .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; margin-bottom: 14px; }
  .flyer.layout-dark .feature-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(255,255,255,0.7); }
  .flyer.layout-dark .feature-dot { width: 6px; height: 6px; border-radius: 50%; background: #3DC78E; flex-shrink: 0; }
  .flyer.layout-dark .divider { height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent); margin: 10px 0; }
  .flyer.layout-dark .footer-bar { padding: 14px 32px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; }
  .flyer.layout-dark .footer-contact { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.4); display: flex; gap: 20px; }
  .flyer.layout-dark .footer-tagline { font-size: 10px; color: rgba(255,255,255,0.25); font-style: italic; }

  /* Layout: Minimal */
  .flyer.layout-minimal { display: flex; flex-direction: column; background: #ffffff; }
  .flyer.layout-minimal .header-bar { padding: 28px 40px; display: flex; justify-content: space-between; align-items: center; }
  .flyer.layout-minimal .header-bar .logo { font-size: 18px; font-weight: 800; color: #0D4F4F; letter-spacing: 3px; }
  .flyer.layout-minimal .header-bar .tagline { font-size: 10px; color: #8a9bb5; font-style: italic; }
  .flyer.layout-minimal .hero-section { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 40px; }
  .flyer.layout-minimal .hero-section img { max-height: 100%; max-width: 100%; object-fit: contain; }
  .flyer.layout-minimal .info-section { padding: 24px 40px 20px; }
  .flyer.layout-minimal .product-title-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid #0D4F4F; }
  .flyer.layout-minimal .product-name { font-size: 36px; font-weight: 300; color: #0D4F4F; line-height: 1.1; }
  .flyer.layout-minimal .product-code { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #8a9bb5; margin-top: 4px; letter-spacing: 1px; }
  .flyer.layout-minimal .price-badge { font-size: 32px; font-weight: 300; color: #0D4F4F; white-space: nowrap; }
  .flyer.layout-minimal .promo-banner { margin-bottom: 16px; }
  .flyer.layout-minimal .promo-text { font-size: 13px; font-weight: 600; color: #E8734A; letter-spacing: 2px; text-transform: uppercase; }
  .flyer.layout-minimal .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 32px; margin-bottom: 20px; }
  .flyer.layout-minimal .feature-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #3B4856; font-weight: 400; }
  .flyer.layout-minimal .feature-dot { width: 8px; height: 1px; background: #0D4F4F; flex-shrink: 0; }
  .flyer.layout-minimal .divider { display: none; }
  .flyer.layout-minimal .footer-bar { padding: 16px 40px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
  .flyer.layout-minimal .footer-contact { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #8a9bb5; display: flex; gap: 24px; }
  .flyer.layout-minimal .footer-tagline { font-size: 10px; color: #bbb; font-style: italic; }

  /* Layout: Split */
  .flyer.layout-split { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr auto; background: #F4F7F9; }
  .flyer.layout-split .header-bar { grid-column: 1 / -1; background: linear-gradient(135deg, #0D4F4F, #1A8A7D); padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; }
  .flyer.layout-split .header-bar .logo { font-size: 18px; font-weight: 800; color: white; letter-spacing: 2px; }
  .flyer.layout-split .header-bar .tagline { font-size: 10px; color: rgba(255,255,255,0.7); font-style: italic; }
  .flyer.layout-split .hero-section { display: flex; align-items: center; justify-content: center; padding: 20px; background: white; }
  .flyer.layout-split .hero-section img { max-height: 100%; max-width: 100%; object-fit: contain; filter: drop-shadow(0 10px 30px rgba(0,0,0,0.1)); }
  .flyer.layout-split .info-section { padding: 24px 24px 16px; display: flex; flex-direction: column; justify-content: center; }
  .flyer.layout-split .product-title-row { flex-direction: column; display: flex; margin-bottom: 12px; }
  .flyer.layout-split .product-name { font-size: 28px; font-weight: 800; color: #0D4F4F; line-height: 1.1; margin-bottom: 8px; }
  .flyer.layout-split .product-code { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #8a9bb5; letter-spacing: 1px; }
  .flyer.layout-split .price-badge { font-size: 24px; font-weight: 800; color: white; background: linear-gradient(135deg, #E8734A, #e85d2f); padding: 8px 16px; border-radius: 8px; display: inline-block; margin: 10px 0; box-shadow: 0 4px 12px rgba(232,115,74,0.25); }
  .flyer.layout-split .promo-banner { background: rgba(61,199,142,0.1); border-left: 3px solid #3DC78E; padding: 8px 12px; margin-bottom: 12px; border-radius: 0 6px 6px 0; }
  .flyer.layout-split .promo-text { font-size: 12px; font-weight: 700; color: #0D4F4F; }
  .flyer.layout-split .features-grid { display: grid; grid-template-columns: 1fr; gap: 6px; margin-bottom: 12px; }
  .flyer.layout-split .feature-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #3B4856; }
  .flyer.layout-split .feature-dot { width: 6px; height: 6px; border-radius: 50%; background: #1A8A7D; flex-shrink: 0; }
  .flyer.layout-split .divider { height: 1px; background: #C8DDE8; margin: 8px 0; }
  .flyer.layout-split .footer-bar { grid-column: 1 / -1; background: #0D4F4F; padding: 12px 28px; display: flex; justify-content: space-between; align-items: center; }
  .flyer.layout-split .footer-contact { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.7); display: flex; gap: 16px; }
  .flyer.layout-split .footer-tagline { font-size: 9px; color: rgba(255,255,255,0.4); font-style: italic; }
</style>
</head>
<body>

<div class="controls">
  <h2>Layout Preset</h2>
  <div class="preset-grid">
    <button class="preset-btn active" onclick="setLayout('modern')">Modern Clean</button>
    <button class="preset-btn" onclick="setLayout('dark')">Bold Dark</button>
    <button class="preset-btn" onclick="setLayout('minimal')">Minimal</button>
    <button class="preset-btn" onclick="setLayout('split')">Split View</button>
  </div>

  <h2>Product Details</h2>
  <div class="control-group">
    <label>Product Name</label>
    <input type="text" id="productName" value="Zürich Chair" oninput="updateAll()">
  </div>
  <div class="control-group">
    <label>Product Code</label>
    <input type="text" id="productCode" value="QB-ZR-HB-01" oninput="updateAll()">
  </div>
  <div class="control-group">
    <label>Price</label>
    <input type="text" id="price" value="R2 955" oninput="updateAll()">
  </div>
  <div class="control-group">
    <label>Promo Text (leave empty to hide)</label>
    <input type="text" id="promoText" value="Engineered for 8+ hours of comfort" oninput="updateAll()">
  </div>
  <div class="control-group">
    <label>Features (one per line)</label>
    <textarea id="features" oninput="updateAll()">Ergonomic Mesh Back
Fully Adjustable Arms
Adjustable Headrest
360° Swivel Base
Height Adjustable
5-Year Warranty</textarea>
  </div>

  <h2>Grid Pattern</h2>
  <div class="control-group">
    <label>Grid Opacity <span class="range-value" id="gridOpacityVal">0.08</span></label>
    <input type="range" id="gridOpacity" min="0" max="0.3" step="0.01" value="0.08" oninput="updateAll()">
  </div>

  <h2>Scale</h2>
  <div class="control-group">
    <label>Preview Scale <span class="range-value" id="scaleVal">100%</span></label>
    <input type="range" id="scale" min="50" max="120" step="5" value="100" oninput="updateAll()">
  </div>
</div>

<div class="preview-area">
  <div class="flyer layout-modern" id="flyer">
    <!-- Rendered by JS -->
  </div>
</div>

const state = {
  layout: 'modern',
  productName: 'Zürich Chair',
  productCode: 'QB-ZR-HB-01',
  price: 'R2 955',
  promoText: 'Engineered for 8+ hours of comfort',
  features: ['Ergonomic Mesh Back','Fully Adjustable Arms','Adjustable Headrest','360° Swivel Base','Height Adjustable','5-Year Warranty'],
  gridOpacity: 0.08,
  scale: 100,
};

function setLayout(layout) {
  state.layout = layout;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  updateAll();
}

function updateAll() {
  state.productName = document.getElementById('productName').value;
  state.productCode = document.getElementById('productCode').value;
  state.price = document.getElementById('price').value;
  state.promoText = document.getElementById('promoText').value;
  state.features = document.getElementById('features').value.split('\n').filter(f => f.trim());
  state.gridOpacity = parseFloat(document.getElementById('gridOpacity').value);
  state.scale = parseInt(document.getElementById('scale').value);
  
  document.getElementById('gridOpacityVal').textContent = state.gridOpacity.toFixed(2);
  document.getElementById('scaleVal').textContent = state.scale + '%';
  
  renderFlyer();
}

function renderFlyer() {
  const flyer = document.getElementById('flyer');
  flyer.className = `flyer layout-${state.layout}`;
  flyer.style.setProperty('--grid-opacity', state.gridOpacity);
  flyer.style.transform = `scale(${state.scale / 100})`;
  
  const promoHTML = state.promoText ? `
    <div class="promo-banner">
      <div class="promo-text">${state.promoText}</div>
    </div>` : '';
  
  const featuresHTML = state.features.map(f => `
    <div class="feature-item">
      <div class="feature-dot"></div>
      <span>${f}</span>
    </div>`).join('');

  flyer.innerHTML = `
    <div class="grid-bg"></div>
    <div class="header-bar">
      <div class="logo">QBUTTON</div>
      <div class="tagline">From Blueprint to Built.</div>
    </div>
    <div class="hero-section">
      <img src="${PRODUCT_IMAGE}" alt="${state.productName}">
    </div>
    <div class="info-section">
      <div class="product-title-row">
        <div>
          <div class="product-name">${state.productName}</div>
          <div class="product-code">${state.productCode}</div>
        </div>
        <div class="price-badge">${state.price}</div>
      </div>
      ${promoHTML}
      <div class="features-grid">${featuresHTML}</div>
      <div class="divider"></div>
    </div>
    <div class="footer-bar">
      <div class="footer-contact">
        <span>www.qbutton.co.za</span>
        <span>010 443 6874</span>
        <span>sales@qbutton.co.za</span>
      </div>
      <div class="footer-tagline">From Blueprint to Built.</div>
    </div>
  `;
}

// Initial render
updateAll();
</script>
</body>
</html>
