<svg width="1280" height="560" viewBox="0 0 1280 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diagram: working days equal Monday to Friday minus public holidays minus company closures">
  <defs>
    <style>
      .lbl{font-family:'Helvetica Neue',Inter,system-ui,sans-serif;font-weight:700;fill:#F5F0E6;}
      .sub{font-family:'Helvetica Neue',Inter,system-ui,sans-serif;font-weight:500;fill:#9AA6B2;}
      .op{font-family:'Helvetica Neue',Inter,system-ui,sans-serif;font-weight:300;fill:#E8A249;}
    </style>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#16202B"/><stop offset="1" stop-color="#121A23"/></linearGradient>
  </defs>
  <rect width="1280" height="560" fill="#0E141C"/>

  <!-- CARD 1: all weekdays (Mon-Fri) -->
  <g transform="translate(70,150)">
    <rect width="250" height="250" rx="18" fill="url(#card)" stroke="#2B3A49" stroke-width="2"/>
    <g transform="translate(26,30)">
      <g fill="#E8A249">
        <rect x="0" y="0" width="32" height="28" rx="6"/><rect x="42" y="0" width="32" height="28" rx="6"/><rect x="84" y="0" width="32" height="28" rx="6"/><rect x="126" y="0" width="32" height="28" rx="6"/><rect x="168" y="0" width="32" height="28" rx="6"/>
        <rect x="0" y="38" width="32" height="28" rx="6"/><rect x="42" y="38" width="32" height="28" rx="6"/><rect x="84" y="38" width="32" height="28" rx="6"/><rect x="126" y="38" width="32" height="28" rx="6"/><rect x="168" y="38" width="32" height="28" rx="6"/>
        <rect x="0" y="76" width="32" height="28" rx="6"/><rect x="42" y="76" width="32" height="28" rx="6"/><rect x="84" y="76" width="32" height="28" rx="6"/><rect x="126" y="76" width="32" height="28" rx="6"/><rect x="168" y="76" width="32" height="28" rx="6"/>
        <rect x="0" y="114" width="32" height="28" rx="6"/><rect x="42" y="114" width="32" height="28" rx="6"/><rect x="84" y="114" width="32" height="28" rx="6"/><rect x="126" y="114" width="32" height="28" rx="6"/><rect x="168" y="114" width="32" height="28" rx="6"/>
      </g>
    </g>
    <text class="lbl" x="125" y="218" text-anchor="middle" font-size="20">Mon–Fri</text>
  </g>

  <text class="op" x="350" y="290" text-anchor="middle" font-size="58">−</text>

  <!-- CARD 2: public holidays -->
  <g transform="translate(392,150)">
    <rect width="250" height="250" rx="18" fill="url(#card)" stroke="#2B3A49" stroke-width="2"/>
    <g transform="translate(60,40)">
      <rect width="130" height="110" rx="14" fill="#13212C" stroke="#00C8FF" stroke-width="2"/>
      <path d="M65 22 l11 24 26 3 -19 18 5 27 -23 -13 -23 13 5 -27 -19 -18 26 -3 z" fill="#00C8FF"/>
    </g>
    <text class="lbl" x="125" y="218" text-anchor="middle" font-size="20">Public holidays</text>
  </g>

  <text class="op" x="672" y="290" text-anchor="middle" font-size="58">−</text>

  <!-- CARD 3: company closures -->
  <g transform="translate(714,150)">
    <rect width="250" height="250" rx="18" fill="url(#card)" stroke="#2B3A49" stroke-width="2"/>
    <g transform="translate(70,38)">
      <rect x="0" y="34" width="110" height="78" rx="12" fill="#1A2430" stroke="#5B6B7A" stroke-width="2"/>
      <path d="M22 34 v-14 a33 33 0 0 1 66 0 v14" fill="none" stroke="#5B6B7A" stroke-width="8"/>
      <circle cx="55" cy="70" r="9" fill="#9AA6B2"/><rect x="51" y="74" width="8" height="22" rx="4" fill="#9AA6B2"/>
    </g>
    <text class="lbl" x="125" y="218" text-anchor="middle" font-size="20">Company closures</text>
  </g>

  <text class="op" x="994" y="284" text-anchor="middle" font-size="46" fill="#F5F0E6" font-family="'Helvetica Neue',Inter,sans-serif" font-weight="300">=</text>

  <!-- RESULT: working days -->
  <g transform="translate(1030,150)">
    <rect width="180" height="250" rx="18" fill="#1B2A1F" stroke="#3FA66A" stroke-width="2"/>
    <text x="90" y="120" text-anchor="middle" font-size="62" class="lbl" fill="#7DE0A6">22</text>
    <text x="90" y="158" text-anchor="middle" font-size="17" class="sub">days</text>
    <text class="lbl" x="90" y="218" text-anchor="middle" font-size="19" fill="#7DE0A6">Working days</text>
  </g>

  <text class="sub" x="640" y="80" text-anchor="middle" font-size="22">What the report actually counts</text>
  <text class="sub" x="640" y="470" text-anchor="middle" font-size="16">Weekends never count · the December shutdown is excluded like a holiday</text>
</svg>
